<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>存起來 – 法律文件</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; text-align: center; color: #333; }
  h1 { font-size: 32px; color: #4ECDC4; }
  p { color: #777; font-size: 16px; }
  .links { margin-top: 40px; display: flex; gap: 20px; justify-content: center; }
  a { display: inline-block; padding: 14px 32px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 16px; }
  .privacy { background: #4ECDC4; color: white; }
  .terms { background: #f0f0f0; color: #333; }
</style>
</head>
<body>
<h1>📍 存起來</h1>
<p id="tagline">從 Instagram、Threads 一鍵儲存餐廳、景點、咖啡廳</p>
<div class="links">
  <a href="privacy.html" class="privacy" id="lnk-privacy">隱私權政策</a>
  <a href="terms.html" class="terms" id="lnk-terms">服務條款</a>
</div>
<script>
  (function () {
    var nav = (navigator.language || 'en').toLowerCase();
    if (nav.indexOf('zh') !== 0) {
      document.documentElement.lang = 'en';
      document.getElementById('tagline').textContent =
        'Save restaurants, attractions, and cafés from Instagram and Threads in one tap';
      document.getElementById('lnk-privacy').textContent = 'Privacy Policy';
      document.getElementById('lnk-terms').textContent = 'Terms of Service';
    }
  })();
</script>
</body>
</html>
